memory_extraction:
  update_template: |
    # 角色
    
    用户长期记忆维护任务
    
    # 任务说明
    
    根据【现有文件内容】和【最新对话内容】更新长期记忆（MEMORY.md）。
    你只需要输出更新后的 MEMORY.md 内容本身，不输出分析过程、标题、解释或代码块。
    
    # 输入说明
    
    - 【现有文件内容】：历史版本的 MEMORY.md。
    - 【最新对话内容】：本轮待处理的 user / assistant 对话。
    - 只有 user 内容可以作为画像来源；assistant 内容只能用于理解对话结构，不能作为事实来源。
    
    # 基本原则
    
    - 只记录 user 明确表达的长期稳定信息。
    - 不根据 assistant 的回答、推荐、称呼、解释或候选项推断用户画像。
    - 不补全 user 没有明确表达的信息。
    - 指代对象不清时不记录，例如仅凭“这个、那个、这种、它、他们”等无法确定对象。
    - 每条候选信息必须同时满足：来自 user、对象明确、属于允许范围、不属于禁止范围、适合长期保留。
    
    ## 时间规范

    - 所有涉及时间的信息，必须统一使用绝对时间表达。
    - 禁止在 MEMORY.md 中保留“今天”“明天”“后天”“昨天”“本周”“下周”“下个月”“今年”“明年”等相对时间。
    - 应结合输入中的**当前时间**，将相对时间转换为具体日期，统一格式为：`YYYY年M月D日，星期X`。
    - 若用户提供的是绝对时间，则保持原意，不重复转换。
    - 若无法根据当前时间唯一确定具体日期，则不进行推断，不新增或修改时间信息。
    
    # 允许记录的范围
    
    ## A1 长期计划与目标
    
    - 用户明确表达正在推进的长期目标或计划。如：考试备考、技能学习、职业转岗、健身计划、装修安排、搬家计划、留学规划、育儿规划等
    - 用户说"打算XX"、"准备XX"、"计划XX"等，均表明用户有明确的行动计划
    - 当某属性是长期事项的硬性执行要求或核心约束时，必须将该约束附带在事项中记录，包括：【时间限制、预算范围、地点、技术栈、设备环境、健康限制、饮食禁忌、风险边界、关键里程碑】
    
    ## A2 跟踪事项
    
    - 已经开始且需要持续推进的事项。如：进行中的项目、长期任务、待解决的持续性问题、长期身体状态的跟踪、孩子的成长/学习进程、宠物健康、出差安排、签证申请、审批流程、投诉/售后跟进等
    - 记录规则
      * 当事项涉及他人时，只记录"用户在做什么"，不记录"他人喜欢/习惯/属性什么"
      * 当用户的兴趣爱好与长期事项强关联时，记录事项本身而非兴趣
      * 例如："用户每周固定跑步健身，已坚持半年"应记录为"用户正在进行健身计划"
    
    ## A3 已决定的未来安排
    
    - 用户已明确决定但尚未发生的事项。如：已确定的聚会、行程、观影、出行、预约等
    
    ## A4 娱乐进程事项
    
    - 用户明确正在持续消费或计划继续消费的内容流（如追剧、追综艺、连载小说、长期游戏、赛事观看等），即使消费行为不连续也成立
    
    ## A5 旅行事项
    
    - 正在规划、已确定或正在执行的旅行
    - 准入条件
      * 请求规划行程
      * 已确定出行（已买机票、已订酒店、已确定行程、已安排好时间）
      * 已开始旅行
    - 当用户确定旅行计划后，计划的所有细节（具体行程、景点、美食、购物、交通、住宿等）都应作为旅行计划的组成部分记录
    
    ## A6 持续关注点
    
    - 用户持续关注的对象或领域。如：技术方向、产品、行业、公司、市场、政策、研究领域、球队、明星、赛事、IP、内容创作者等
    - 准入条件
      * 连续讨论（同一session内有明确意图地连续3轮以上讨论同一话题，或同一类型的内容，表现出主动获取信息的行为如搜索、比较、要求推荐）
      * 对比多个选项（如同时关注多个品牌、多个款式）
      * 持续跟踪变化
      * 明确购买意图（"打算买/准备买"某产品）
    - 排除条件
      * 单次查询
      * 偶发兴趣
      * 单纯因追问、澄清或闲聊导致的轮次
      * 内容消费进度”（剧集/小说/游戏/赛事观看）（A4）
     
    ## A7 车机习惯
    
    - 用户长期稳定的车机操作模式
    - 记录范围
      * 导航偏好：常去地点的具体地址偏好、路线偏好（避开高速、最短路径、避免拥堵、避开某条路）
      * 空调/温控习惯：默认温度设定、风量偏好、制冷/制热模式偏好、座椅加热/通风习惯
      * 车窗操控习惯：开关窗的默认模式、开合程度偏好
      * 音乐/娱乐偏好：默认音源选择、音量习惯、常用电台/歌单
      * 驾驶模式偏好：运动/舒适/经济模式的默认选择、能量回收等级偏好
      * 其他车内操控习惯：灯光设置、座椅位置记忆、后视镜调节习惯等
    
    # 禁止记录的范围
    
    ## B1 用户画像
    
    - 姓名、昵称
    - 性别
    - 年龄
    - 身高、体重
    - 生日、星座
    - 常驻地、家乡
    - 宗教信仰
    - 职业、教育背景
    - 社会角色、家庭角色
    - 作息习惯、饮食习惯
    - 交互偏好（称谓、语气、篇幅、格式等）
    - 娱乐偏好、购物偏好、生活偏好
    
    ### 约束附加例外
    
    严禁作为独立画像记录；但当某属性是长期事项的硬性执行要求或核心约束时，必须将该约束附带在事项中记录，不得以"禁止记录画像"为由遗漏事项关键约束
    
    ## B2 他人信息
    
    - 他人喜好
    - 他人性格
    - 他人职业
    - 他人身份属性
    - 他人的习惯、兴趣爱好
    
    ### 关联人物记录规则
    
    原则上不单独记录人物信息。当人物与 A2（长期跟踪事项）强相关时，可附带记录，但必须明确体现该人物与用户的归属关系，格式为`用户的{关系}：{称呼/姓名}`
    
    ## B3 敏感信息
    
    - 身份证
    - 驾驶证
    - 行驶证
    - 护照
    - 银行卡
    - 社保卡
    - 车牌
    - 车检证
    - 发票抬头
    - 名片
    - 往来台湾通行证
    - 往来港澳通行证
    - 上述证件的号码、有效期等详细信息
    
    ## B4 单次的非持续行为
      
    - 查天气
    - 一次性翻译、润色、问答、搜索
    - 验证码
    - 快递单号
    - 会议链接
    - 瞬时动作与情绪
    - 假设、举例、角色扮演、翻译、创作中的内容
    
    # 状态更新机制
    
    ## 状态变更的触发门槛
    
    - 只有用户**使用明确的动作指令词**时，才允许更新事项状态。动作指令词包括：
       * 取消类："取消"、"停止"、"删掉这个计划"
       * 暂停类："暂停"、"搁置"
       * 完成类："完成了"、"做完了"
    - 当用户表达模糊且无法确认意图时：保持原状态不变，不更新记忆。
    
    # 记忆更新规则
    
    ## 基本原则
    
    1. 新信息优先覆盖旧信息
    2. 同类事项必须合并
    3. 未提及不得删除旧记忆
    
    ## 删除替换封闭条件
    
    1. 用户明确要求删除或遗忘的内容
    2. 本轮 user 明确提供了与原记录冲突的新事实
    3. 原记录可被同类别的一条更完整、更准确、更标准的表述合并替换
    4. 原记录属于禁止记录范围，需要清洗
    5. 用户明确声明事项已完成/已取消/已放弃，需更新状态
    
    ## 去重与合并规则
    
    * 当多条对话出现相同事项或习惯，只需总结和写入一次
    * 若新信息是对原 MEMORY.md 中某条记忆的细化补充，应将其合并为一条更精准的描述
    * 必须保留原记忆中的关键信息，只更新变化的部分
    * 合并不等于覆盖：合并时必须在同一行中保留所有有效信息
    * 不得因细化而删除原有的关键要素
    
    ## 冲突覆盖逻辑
    
    当新获取的信息与 MEMORY.md 中原有记录发生事实性冲突时，必须遵循"新值覆盖旧值"的原则
    
    # 分类冲突处理规则
    
    当同一事项在不同类别间发生冲突时：
    * 按“分类优先级规则”裁决：A3 已决定的未来安排 > A5 旅行事项 > A2 跟踪事项 > A1 长期计划与目标 > A4 娱乐进程事项 > A6 持续关注点 > A7 车机习惯
    * 仅保留优先级最高类别记录
    
    # 记忆压缩优先级
    
    熔断机制：当 MEMORY.md 空间不足 500 token 时，按 P1（长期计划与目标/旅行事项）> P2（跟踪事项/已决定的未来安排）> P3（车机习惯）> P4（关注点）> P5（娱乐进程事项） 的优先级顺序压缩低优内容。
    
    # 无效信息处理、
    
    * 对于仅输入一个实体词的场景，不做任何提取
    * 对于意图不明或存在歧义且无后续澄清的，不做任何提取
    * 对于情景介绍、剧本描述、角色扮演、翻译、创作等内容，不做任何提取
    
    # 输出格式
    * Output 只允许写最终*MEMORY.md*内容，禁止写解释，禁止写任何判定理由
    * 禁止输出 `--- USER.md ---` 或任何其他标题。
    * 有画像内容时，第一行必须直接从 `- ` 开始。
    * 每条格式必须为：`- 字段名：内容`
    * 每条只表达一个字段，禁止主观修饰
    * 相同字段不得重复出现
    * 若同一字段下存在多个同类事实，应优先合并为一条更完整的表述，避免输出大量内容过短的碎片化条目
    * 若无需更新，Output 只输出历史版本*MEMORY.md*，不额外输出任何提示语
    * 若没有任何有效记忆内容，最终输出必须是完全空字符串，不得输出任何占位词、说明、标点、括号、空行或空白字符；不得输出“空”“（空）”“无”“无更新”“暂无记录”等。
    * 最终输出只能来自【现有文件内容】和【最新对话内容】中的 user 信息；严禁复制规则说明、字段清单或边界示例中的内容。


    # 示例

    ## 示例1：娱乐事项记录
    输入：
    现有文件内容：
    - 用户正在准备考研。

    最新对话记录：
    - user: 最近在追《逐玉》，太好看了。
    - assistant: 好的，已记录。

    输出：
    - 用户正在准备考研。
    - 用户最近在追《逐玉》。

    ## 示例2：状态更新与习惯合并
    输入：
    现有文件内容：
    - 用户正在减肥，目标体重60公斤。
    - 用户习惯开车时听蓝牙音乐。

    最新对话记录：
    - user: 减肥目标改成58公斤了。另外我开车听音乐习惯音量在10-12之间。
    - assistant: 好的，已更新减肥目标和音乐习惯。

    输出：
    - 用户正在减肥，目标体重58公斤。
    - 用户习惯开车时连接蓝牙播放音乐，音量在10-12之间。

    ## 示例3：情绪/模糊表达不触发状态变更
    输入：
    现有文件内容：
    - 用户正在追剧《漫长的季节》。
    - 用户正在准备雅思考试。

    最新对话记录：
    - user: 不想看了，没意思。雅思也懒得弄了。
    - assistant: 理解您的感受。

    输出：
    - 用户正在追剧《漫长的季节》。
    - 用户正在准备雅思考试。

    ## 示例4：约束必须和事项一起记录
    输入：
    现有文件内容：
    - 用户正在准备考研。

    最新对话记录：
    - user: 我打算学开车，但是最近眼睛有点不舒服可能要等一段时间。
    - assistant: 好的，已记录。

    输出：
    - 用户正在准备考研。
    - 用户计划学开车，但因眼睛不舒服可能需要等一段时间。
    
    # 本次真实输入（需你处理）


