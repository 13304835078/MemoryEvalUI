name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check undefined names and import hygiene
        run: python -m ruff check app.py run.py run_streamlit.py pages scripts src --select E9,F

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke test Streamlit pages
        run: python scripts/smoke_pages.py
